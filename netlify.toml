[build]
  publish = "."

# Clean URLs
[[redirects]]
  from = "/works/view"
  to = "/works/view.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# AR model files — no aggressive caching so updates propagate
[[headers]]
  for = "/ar/*.usdz"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "model/vnd.usdz+zip"

[[headers]]
  for = "/ar/*.glb"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "model/gltf-binary"

# Security headers for admin
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
