
[build]
  publish = "."
  functions = "netlify/functions"

# Installs dependencies declared in netlify/functions/package.json
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Clean URLs
[[redirects]]
  from = "/works/view"
  to = "/works/view.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/portfolio.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/works/pigeonholing.html"
  to = "/works/view.html?id=pigeonholing"
  status = 302

